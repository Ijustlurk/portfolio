services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-app
    container_name: portfolio_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-portfolio_cms_db}
      - DB_USERNAME=${DB_USERNAME:-portfolio_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      - APP_KEY=${APP_KEY}
      - SESSION_SECURE_COOKIE=false
    volumes:
      - portfolio_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-portfolio_cms_db}
      MYSQL_USER: ${DB_USERNAME:-portfolio_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - portfolio_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  portfolio_storage:
  portfolio_db_data:
